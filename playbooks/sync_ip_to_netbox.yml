- name: Opret IP-adresser i NetBox
  hosts: isp
  gather_facts: no

  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: cisco.ios.ios
    ansible_network_cli_ssh_type: paramiko
    ansible_user: "{{ SSHA }}"
    ansible_password: "{{ SSHP }}"
    ansible_become: false
    ansible_ssh_common_args: "{{ SSH_KEX }}"
    interface_prefix_map:
      Loopback1: 32
      GigabitEthernet0/0: 30
      GigabitEthernet0/1: 30
      GigabitEthernet0/2: 30
      GigabitEthernet0/3: 30
      GigabitEthernet0/4: 30

  tasks:
    - name: Hent show ip interface brief
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
      register: show_ip_int_brief

    - name: Hent interface config
      cisco.ios.ios_command:
        commands:
          - show running-config | section ^interface
      register: show_run_interfaces

    - name: Nulstil interface IP map
      set_fact:
        int_map: {}

    - name: Byg interface/IP map
      set_fact:
        int_map: "{{ int_map | combine({ parts[0]: parts[1] }) }}"
      vars:
        parts: "{{ item.split() }}"
      loop: "{{ show_ip_int_brief.stdout_lines[0][1:] }}"
      when:
        - item is string
        - item | trim != ""
        - item.split() | length > 1
        - item.split()[1] != "unassigned"

    - name: Nulstil interface VRF map
      set_fact:
        int_vrf_map: {}

    - name: Byg interface/VRF map
      set_fact:
        int_vrf_map: "{{ int_vrf_map | combine({ current_interface: current_vrf }) }}"
      vars:
        current_interface: "{{ item.0 }}"
        current_vrf: "{{ item.1 }}"
      loop: >-
        {{
          show_run_interfaces.stdout[0]
          | regex_findall('interface\\s+(\\S+)[\\s\\S]*?ip vrf forwarding\\s+(\\S+)')
        }}

    - name: Vis interface IP map
      debug:
        var: int_map

    - name: Vis interface VRF map
      debug:
        var: int_vrf_map

    - name: Opret IP-adresser uden VRF
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ NETBOX_URL }}"
        netbox_token: "{{ NETBOX_TOKEN }}"
        data:
          address: "{{ int_map[item] }}/{{ interface_prefix_map[item] }}"
          assigned_object:
            device: "{{ inventory_hostname }}"
            name: "{{ item }}"
          status: active
        state: present
      loop: "{{ int_map.keys() | list }}"
      when:
        - interface_prefix_map[item] is defined
        - int_vrf_map[item] is not defined
        - not (inventory_hostname == 'ISP-EDGE' and item == 'GigabitEthernet0/1')
      delegate_to: localhost

    - name: Opret IP-adresser med VRF
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ NETBOX_URL }}"
        netbox_token: "{{ NETBOX_TOKEN }}"
        data:
          address: "{{ int_map[item] }}/{{ interface_prefix_map[item] }}"
          assigned_object:
            device: "{{ inventory_hostname }}"
            name: "{{ item }}"
          vrf: "{{ int_vrf_map[item] }}"
          status: active
        state: present
      loop: "{{ int_map.keys() | list }}"
      when:
        - interface_prefix_map[item] is defined
        - int_vrf_map[item] is defined
        - not (inventory_hostname == 'ISP-EDGE' and item == 'GigabitEthernet0/1')
      delegate_to: localhost
