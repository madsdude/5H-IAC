- name: Opret ny kunde i eksisterende VRF
  hosts: "{{ pe_router }}"
  gather_facts: no

  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: cisco.ios.ios
    ansible_network_cli_ssh_type: paramiko
    ansible_user: "{{ SSHA }}"
    ansible_password: "{{ SSHP }}"
    ansible_become: false
    ansible_ssh_common_args: "{{ SSH_KEX }}"

  tasks:
    - name: Konfigurer kundeinterface
      cisco.ios.ios_config:
        lines:
          - description {{ customer_description }}
          - ip vrf forwarding {{ vrf_name }}
          - ip address {{ customer_wan_ip }} {{ customer_wan_mask }}
          - ip policy route-map TO-INTERNET
          - no shutdown
        parents: "interface {{ customer_interface }}"

    - name: Opret DHCP pool til kunde
      cisco.ios.ios_config:
        lines:
          - vrf {{ vrf_name }}
          - network {{ customer_wan_network }} {{ customer_wan_mask }}
          - default-router {{ customer_wan_ip }}
          - dns-server {{ customer_dns }}
        parents: "ip dhcp pool {{ dhcp_pool_name }}"

    - name: Udeluk kundens gateway fra DHCP
      cisco.ios.ios_config:
        lines:
          - ip dhcp excluded-address {{ customer_wan_ip }}

    - name: Opret static route til kundens LAN i VRF
      cisco.ios.ios_config:
        lines:
          - ip route vrf {{ vrf_name }} {{ customer_lan_network }} {{ customer_lan_mask }} {{ customer_ce_ip }}

    - name: Vis status
      debug:
        msg:
          - "Kunde oprettet på {{ inventory_hostname }}"
          - "Interface: {{ customer_interface }}"
          - "VRF: {{ vrf_name }}"
          - "WAN: {{ customer_wan_ip }} {{ customer_wan_mask }}"
          - "LAN route: {{ customer_lan_network }} {{ customer_lan_mask }} via {{ customer_ce_ip }}"
