- name: Opret IP-adresser i NetBox
  hosts: isp
  gather_facts: no

  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: cisco.ios.ios
    ansible_network_cli_ssh_type: paramiko
    ansible_user: "{{ SSHA }}"
    ansible_password: "{{ SSHP }}"
    ansible_become: false
    ansible_ssh_common_args: "{{ SSH_KEX }}"

  tasks:
    - name: Hent show ip interface brief
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
      register: show_ip_int_brief

    - name: Nulstil interface map
      set_fact:
        int_map: {}

    - name: Byg interface/IP map
      set_fact:
        int_map: "{{ int_map | combine({ parts[0]: parts[1] }) }}"
      vars:
        parts: "{{ item.split() }}"
      loop: "{{ show_ip_int_brief.stdout_lines[0][1:] }}"
      when:
        - item is string
        - item | trim != ""
        - item.split() | length > 1
        - item.split()[1] != "unassigned"

    - name: Opret IP på GigabitEthernet0/0
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ NETBOX_URL }}"
        netbox_token: "{{ NETBOX_TOKEN }}"
        data:
          address: "{{ int_map['GigabitEthernet0/0'] }}/30"
          assigned_object:
            device: "{{ inventory_hostname }}"
            name: "GigabitEthernet0/0"
          status: active
        state: present
      delegate_to: localhost
      when: int_map['GigabitEthernet0/0'] is defined

    - name: Opret IP på GigabitEthernet0/1
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ NETBOX_URL }}"
        netbox_token: "{{ NETBOX_TOKEN }}"
        data:
          address: "{{ int_map['GigabitEthernet0/1'] }}/30"
          assigned_object:
            device: "{{ inventory_hostname }}"
            name: "GigabitEthernet0/1"
          status: active
        state: present
      delegate_to: localhost
      when: int_map['GigabitEthernet0/1'] is defined

    - name: Opret IP på GigabitEthernet0/2
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ NETBOX_URL }}"
        netbox_token: "{{ NETBOX_TOKEN }}"
        data:
          address: "{{ int_map['GigabitEthernet0/2'] }}/30"
          assigned_object:
            device: "{{ inventory_hostname }}"
            name: "GigabitEthernet0/2"
          status: active
        state: present
      delegate_to: localhost
      when: int_map['GigabitEthernet0/2'] is defined

    - name: Opret IP på GigabitEthernet0/3
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ NETBOX_URL }}"
        netbox_token: "{{ NETBOX_TOKEN }}"
        data:
          address: "{{ int_map['GigabitEthernet0/3'] }}/30"
          assigned_object:
            device: "{{ inventory_hostname }}"
            name: "GigabitEthernet0/3"
          status: active
        state: present
      delegate_to: localhost
      when: int_map['GigabitEthernet0/3'] is defined

    - name: Opret IP på GigabitEthernet0/4
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ NETBOX_URL }}"
        netbox_token: "{{ NETBOX_TOKEN }}"
        data:
          address: "{{ int_map['GigabitEthernet0/4'] }}/30"
          assigned_object:
            device: "{{ inventory_hostname }}"
            name: "GigabitEthernet0/4"
          status: active
        state: present
      delegate_to: localhost
      when: int_map['GigabitEthernet0/4'] is defined

    - name: Opret IP på Loopback1
      netbox.netbox.netbox_ip_address:
        netbox_url: "{{ NETBOX_URL }}"
        netbox_token: "{{ NETBOX_TOKEN }}"
        data:
          address: "{{ int_map['Loopback1'] }}/32"
          assigned_object:
            device: "{{ inventory_hostname }}"
            name: "Loopback1"
          status: active
        state: present
      delegate_to: localhost
      when: int_map['Loopback1'] is defined

    - name: Vis parsed map
      debug:
        var: int_map
